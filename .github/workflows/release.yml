name: Release

# Trigger: push a version tag like v1.0.0 or v1.0.0-beta.1
on:
  push:
    tags:
      - 'v[0-9]*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Must match ARG ORT_VERSION in cross/Dockerfile.aarch64 and ort-sys Cargo.lock
  ORT_VERSION: "1.22.0"

jobs:
  # ── macOS — one Apple Silicon runner builds both macOS targets ────────────
  build-macos:
    name: Build · ${{ matrix.target }}
    runs-on: macos-latest      # GitHub's arm64 (M-series) runner
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin   # native
          - target: x86_64-apple-darwin    # cross-compiled via Apple universal SDK

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --bin voicebot --target ${{ matrix.target }} --features avspeech

      - name: Package
        run: |
          BIN="target/${{ matrix.target }}/release/voicebot"
          strip "$BIN"
          tar -czf "voicebot-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" voicebot
          shasum -a 256 "voicebot-${{ matrix.target }}.tar.gz" > "voicebot-${{ matrix.target }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: voicebot-${{ matrix.target }}
          path: voicebot-${{ matrix.target }}.tar.gz*
          if-no-files-found: error
          retention-days: 1

  # ── Linux — both targets built on ubuntu-latest ───────────────────────────
  # x86_64: native build.  aarch64: cross-compile via `cross` + Docker.
  # ONNX Runtime is pre-installed to /opt/onnxruntime and bundled in the tarball
  # so users don't need to install it separately.
  build-linux:
    name: Build · ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ── x86_64 native: install deps + pre-built ORT ───────────────────────
      - name: Install Linux build deps (x86_64)
        if: matrix.use_cross == false
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev espeak-ng pkg-config build-essential libssl-dev cmake libclang-dev

      - name: Download ONNX Runtime ${{ env.ORT_VERSION }} x86_64
        if: matrix.use_cross == false
        run: |
          mkdir -p /opt/onnxruntime
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x86_64-${ORT_VERSION}.tgz" \
            | tar -xz --strip-components=1 -C /opt/onnxruntime
          ln -sf "/opt/onnxruntime/lib/libonnxruntime.so.${ORT_VERSION}" \
                 /opt/onnxruntime/lib/libonnxruntime.so
          echo "ORT_LIB_LOCATION=/opt/onnxruntime/lib" >> "$GITHUB_ENV"
          echo "ORT_STRATEGY=system"                   >> "$GITHUB_ENV"

      # ── aarch64 cross: install `cross` (Dockerfile handles the rest) ──────
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --bin voicebot --target ${{ matrix.target }} --features kokoro

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --bin voicebot --target ${{ matrix.target }} --features kokoro

      # ── Package binary + ONNX Runtime .so ────────────────────────────────
      - name: Package
        run: |
          BIN="target/${{ matrix.target }}/release/voicebot"
          strip "$BIN" 2>/dev/null || true

          # Determine where ORT libs live
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            # For the cross build, extract ORT from our Docker image
            ORT_DIR="$(mktemp -d)"
            curl -fsSL \
              "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-aarch64-${ORT_VERSION}.tgz" \
              | tar -xz --strip-components=1 -C "$ORT_DIR"
            ORT_LIB_SRC="$ORT_DIR/lib"
          else
            ORT_LIB_SRC="/opt/onnxruntime/lib"
          fi

          # Build staging directory
          mkdir -p staging/lib
          cp "$BIN" staging/voicebot
          cp "$ORT_LIB_SRC"/libonnxruntime.so.* staging/lib/
          # Create unversioned symlink inside the tarball
          (cd staging/lib && ln -sf "libonnxruntime.so.${ORT_VERSION}" libonnxruntime.so)

          tar -czf "voicebot-${{ matrix.target }}.tar.gz" -C staging voicebot lib
          sha256sum "voicebot-${{ matrix.target }}.tar.gz" > "voicebot-${{ matrix.target }}.tar.gz.sha256"
          echo "Tarball contents:"
          tar -tzf "voicebot-${{ matrix.target }}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: voicebot-${{ matrix.target }}
          path: voicebot-${{ matrix.target }}.tar.gz*
          if-no-files-found: error
          retention-days: 1

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Build release body
        id: body
        run: |
          TAG="${{ github.ref_name }}"
          {
            echo 'body<<EOF'
            echo "## Installation"
            echo ""
            echo '```sh'
            echo "curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | sh"
            echo '```'
            echo ""
            echo "Pin a specific version:"
            echo '```sh'
            echo "VOICEBOT_VERSION=${TAG} \\"
            echo "  curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | sh"
            echo '```'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Voicebot ${{ github.ref_name }}
          body: ${{ steps.body.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
            install.sh
