# Evaluator model used to judge quality benchmark responses.
# This model scores each fixture response against a rubric and is NOT itself
# a benchmark target — it must be a capable, instruction-following model
# (ideally larger or higher-quality than the models under test).
# The quality benchmark script reads this section separately from `servers`.
evaluator:
  host: "http://tesla.local"
  runtime: "tesla-vllm"
  port: 8005
  token: ""
  model: Qwen3.6-27B-NVFP4
  # temperature: 0.0 — evaluator always runs at zero temperature for determinism
  temperature: 0.0
  # max_tokens: budget for the evaluator's JSON verdict per fixture
  max_tokens: 512
