name: CI - Test on Push

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust:
          - stable
          - beta
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          override: true
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libclang-dev \
            cmake \
            espeak-ng

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: models/ggml-large-v3-turbo.bin
          key: whisper-ggml-base-v1

      - name: Download Whisper base model
        run: |
          mkdir -p models
          if [ ! -f models/ggml-large-v3-turbo.bin ]; then
            curl -L -o models/ggml-large-v3-turbo.bin \
              https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3-turbo.bin
          fi

      - name: Run unit and pipeline e2e tests
        # speaker feature requires libonnxruntime + libsherpa-onnx-c-api shared libs
        # which are not available in the CI environment. Speaker verification is not
        # exercised by any e2e test, so it is excluded here.
        run: cargo test --all-targets --features kokoro --verbose

      - name: Run STT e2e tests (Whisper model required)
        env:
          WHISPER_MODEL: models/ggml-base.bin
        run: |
          cargo test --features kokoro \
            e2e::stt_transcribes_wav_file \
            -- --ignored --nocapture
          cargo test --features kokoro \
            e2e::full_pipeline_wav_to_db \
            -- --ignored --nocapture
