name: Release

# Trigger: push a version tag like v1.0.0 or v1.0.0-beta.1
on:
  push:
    tags:
      - 'v[0-9]*.*.*'

# Required act_runner labels:
#   ubuntu-latest — Linux x86_64 (e.g. tesla.local itself)
#   macos-latest  — Your Mac (builds both macOS targets + aarch64 Linux via cross)
#
# Register a runner:
#   act_runner register --instance http://tesla.local:3000 \
#     --token <token> --labels ubuntu-latest,linux
#
# Register the Mac runner:
#   act_runner register --instance http://tesla.local:3000 \
#     --token <token> --labels macos-latest,macos

env:
  GITEA_URL: http://tesla.local:3000
  GITEA_REPO: danielvela/voicebot
  CARGO_TERM_COLOR: always

jobs:
  # ── macOS — one runner builds both macOS targets ───────────────────────────
  build-macos:
    name: Build · ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin   # native on M-series
          - target: x86_64-apple-darwin    # cross via Apple universal SDK

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust + target
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --bin voicebot --target ${{ matrix.target }} --features avspeech

      - name: Package
        run: |
          BIN="target/${{ matrix.target }}/release/voicebot"
          strip "$BIN"
          tar -czf "voicebot-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" voicebot
          shasum -a 256 "voicebot-${{ matrix.target }}.tar.gz" > "voicebot-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: voicebot-${{ matrix.target }}
          path: voicebot-${{ matrix.target }}.tar.gz*
          if-no-files-found: error
          retention-days: 1

  # ── Linux — both targets built on ubuntu-latest ────────────────────────────
  # x86_64: native.  aarch64: cross-compile via `cross` + Docker.
  # ort 2.x statically links ONNX Runtime — no .so to bundle.
  build-linux:
    name: Build · ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust + target
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      # ── x86_64 native deps ────────────────────────────────────────────────
      - name: Install Linux build deps (x86_64)
        if: matrix.use_cross == false
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev espeak-ng pkg-config build-essential \
            libssl-dev cmake libclang-dev

      # ── aarch64: install cross ────────────────────────────────────────────
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --bin voicebot --target ${{ matrix.target }} --features kokoro

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --bin voicebot --target ${{ matrix.target }} --features kokoro

      # ── Package binary ────────────────────────────────────────────────────
      - name: Package
        run: |
          BIN="target/${{ matrix.target }}/release/voicebot"
          strip "$BIN" 2>/dev/null || true
          tar -czf "voicebot-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" voicebot
          sha256sum "voicebot-${{ matrix.target }}.tar.gz" > "voicebot-${{ matrix.target }}.tar.gz.sha256"
          echo "Tarball contents:"; tar -tzf "voicebot-${{ matrix.target }}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: voicebot-${{ matrix.target }}
          path: voicebot-${{ matrix.target }}.tar.gz*
          if-no-files-found: error
          retention-days: 1

  # ── Gitea Release ─────────────────────────────────────────────────────────
  release:
    name: Gitea Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for install-gitea.sh)
        uses: actions/checkout@v4

      # v3 downloads each artifact into its own subdirectory:
      #   artifacts/voicebot-aarch64-apple-darwin/voicebot-aarch64-apple-darwin.tar.gz
      #   artifacts/voicebot-x86_64-unknown-linux-gnu/voicebot-x86_64-unknown-linux-gnu.tar.gz  …
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release and upload assets
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e

          IS_PRERELEASE="false"
          case "$TAG" in *-*) IS_PRERELEASE="true" ;; esac

          BODY="## Installation\n\n\`\`\`sh\ncurl -fsSL ${GITEA_URL}/${GITEA_REPO}/releases/download/${TAG}/install-gitea.sh | sh\n\`\`\`"

          # 1. Create release via Gitea API
          RESPONSE=$(curl -s -f -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"Voicebot ${TAG}\",\"body\":\"${BODY}\",\"draft\":false,\"prerelease\":${IS_PRERELEASE}}" \
            "${GITEA_URL}/api/v1/repos/${GITEA_REPO}/releases")

          RELEASE_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Release ID: $RELEASE_ID"

          # 2. Upload tarballs + checksums (v3 nests files in per-artifact subdirs)
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) | while read -r ASSET; do
            FNAME="$(basename "$ASSET")"
            echo "Uploading: $FNAME"
            curl -s -f -X POST \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${ASSET};filename=${FNAME}" \
              "${GITEA_URL}/api/v1/repos/${GITEA_REPO}/releases/${RELEASE_ID}/assets"
          done

          # 3. Upload install-gitea.sh from the checkout
          curl -s -f -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@install-gitea.sh;filename=install-gitea.sh" \
            "${GITEA_URL}/api/v1/repos/${GITEA_REPO}/releases/${RELEASE_ID}/assets"

          echo "Done: ${GITEA_URL}/${GITEA_REPO}/releases/tag/${TAG}"
