name: Release

# Trigger: push a version tag like v1.0.0 or v1.0.0-beta.1
on:
  push:
    tags:
      - 'v[0-9]*.*.*'

# Required act_runner labels:
#   ubuntu-latest — Linux x86_64 (tesla.local itself)
#   macos-latest  — Your Mac (builds both macOS targets)

env:
  GITEA_URL: http://tesla.local:3000
  # Inside Docker job containers, tesla.local doesn't resolve via mDNS.
  # act_runner exposes Gitea under the hostname "gitea" inside Docker networks.
  GITEA_API: http://gitea:3000/api/v1
  GITEA_REPO: danielvela/voicebot
  CARGO_TERM_COLOR: always

jobs:
  # ── Create the Gitea release first ────────────────────────────────────────
  # All build jobs depend on this so they have a release ID to upload to.
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Gitea release and upload install script
        id: create
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e

          IS_PRERELEASE="false"
          case "$TAG" in *-*) IS_PRERELEASE="true" ;; esac

          BODY="## Installation\n\n\`\`\`sh\ncurl -fsSL ${GITEA_URL}/${GITEA_REPO}/releases/download/${TAG}/install-gitea.sh | sh\n\`\`\`"

          # Create release (may already exist if a previous attempt partially succeeded)
          curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"Voicebot ${TAG}\",\"body\":\"${BODY}\",\"draft\":false,\"prerelease\":${IS_PRERELEASE}}" \
            "${GITEA_API}/repos/${GITEA_REPO}/releases" || true

          # Fetch the release ID (works whether just created or already existed)
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${GITEA_TOKEN}" \
            "${GITEA_API}/repos/${GITEA_REPO}/releases/tags/${TAG}" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "Release ID: ${RELEASE_ID}"

          # Upload install-gitea.sh
          curl -sf -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@install-gitea.sh;filename=install-gitea.sh" \
            "${GITEA_API}/repos/${GITEA_REPO}/releases/${RELEASE_ID}/assets" \
            && echo "Uploaded install-gitea.sh" || echo "Warning: install-gitea.sh upload failed (may already exist)"

  # ── macOS — one runner builds both macOS targets ───────────────────────────
  build-macos:
    name: Build · ${{ matrix.target }}
    needs: [create-release]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin   # native on M-series
          - target: x86_64-apple-darwin    # cross via Apple universal SDK

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust + target
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --bin voicebot --target ${{ matrix.target }} --features avspeech

      - name: Package
        run: |
          BIN="target/${{ matrix.target }}/release/voicebot"
          strip "$BIN"
          tar -czf "voicebot-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" voicebot
          shasum -a 256 "voicebot-${{ matrix.target }}.tar.gz" > "voicebot-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload to release
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          for ASSET in voicebot-${{ matrix.target }}.tar.gz voicebot-${{ matrix.target }}.tar.gz.sha256; do
            echo "Uploading: $ASSET"
            curl -sf -X POST \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${ASSET};filename=${ASSET}" \
              "${GITEA_API}/repos/${GITEA_REPO}/releases/${RELEASE_ID}/assets"
          done

  # ── Linux — both targets built on ubuntu-latest ────────────────────────────
  # x86_64: native.
  # aarch64: cross-compile using gcc-aarch64-linux-gnu (no Docker-in-Docker).
  #   `cross` crate is avoided: when act_runner runs jobs inside Docker,
  #   cross's volume mounts reference the HOST filesystem, not the container,
  #   so ~/.cargo never lands inside the cross container → cargo: not found.
  # ort 2.x statically links ONNX Runtime — no .so to bundle.
  # Uploads go directly to the Gitea API (avoids upload-artifact DNS issues).
  build-linux:
    name: Build · ${{ matrix.target }}
    needs: [create-release]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust + target
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      # ── x86_64 native deps ────────────────────────────────────────────────
      - name: Install build deps (x86_64)
        if: matrix.use_cross == false
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev espeak-ng pkg-config build-essential \
            libssl-dev cmake libclang-dev

      # ── aarch64: system cross-compiler + ARM64 libs ───────────────────────
      # Uses gcc-aarch64-linux-gnu directly with cargo --target.
      # No Docker-in-Docker, no volume mount issues.
      - name: Install cross-compilation toolchain (aarch64)
        if: matrix.use_cross == true
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libasound2-dev:arm64 libssl-dev:arm64 \
            pkg-config cmake libclang-dev
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build (x86_64)
        if: matrix.use_cross == false
        run: cargo build --release --bin voicebot --target ${{ matrix.target }} --features kokoro

      - name: Build (aarch64 cross)
        if: matrix.use_cross == true
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_SYSROOT_DIR: "/"
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --bin voicebot --target ${{ matrix.target }} --features kokoro

      # ── Package binary ────────────────────────────────────────────────────
      - name: Package
        run: |
          BIN="target/${{ matrix.target }}/release/voicebot"
          strip "$BIN" 2>/dev/null || true
          tar -czf "voicebot-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" voicebot
          sha256sum "voicebot-${{ matrix.target }}.tar.gz" > "voicebot-${{ matrix.target }}.tar.gz.sha256"
          echo "Tarball contents:"; tar -tzf "voicebot-${{ matrix.target }}.tar.gz"

      # ── Upload directly to Gitea release API ──────────────────────────────
      # Uses http://gitea:3000 (Docker-internal hostname) — tesla.local mDNS
      # fails inside Docker containers but gitea:3000 resolves on the network.
      - name: Upload to release
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          for ASSET in voicebot-${{ matrix.target }}.tar.gz voicebot-${{ matrix.target }}.tar.gz.sha256; do
            echo "Uploading: $ASSET"
            curl -sf -X POST \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${ASSET};filename=${ASSET}" \
              "${GITEA_API}/repos/${GITEA_REPO}/releases/${RELEASE_ID}/assets"
          done
          echo "Done: ${GITEA_URL}/${GITEA_REPO}/releases/tag/${{ github.ref_name }}"
