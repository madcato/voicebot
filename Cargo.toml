[package]
name = "voicebot"
version = "0.1.0"
edition = "2024"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Audio capture / playback
cpal = "0.17"

# Audio resampling
rubato = "0.15"

# Environment and configuration
dotenvy = "0.15"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async channels and futures
async-channel = "2"
async-trait = "0.1"
futures-util = "0.3"

# DB
chrono = { version = "0.4", features = ["serde"] }
sqlx = { version = "=0.8.6", features = ["sqlite", "runtime-tokio-native-tls"] }
uuid = { version = "1", features = ["v4"] }

# Voice Activity Detection (Silero)
voice_activity_detector = "0.2"

# HTTP client for LLM streaming (SSE)
reqwest = { version = "0.12", features = ["json", "stream"] }

# STT — whisper.cpp embedded (Metal GPU on Apple Silicon)
whisper-rs = { version = "0.15", features = ["metal"] }

# Sentence boundary detection for TTS streaming
regex = "1"

[dev-dependencies]
# Mock HTTP server for LLM client integration tests
wiremock = "0.6"
# Safe env-var overrides in parallel tests
temp-env = "0.3"
