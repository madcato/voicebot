[package]
name = "voicebot"
version = "0.1.0"
edition = "2024"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Audio capture
cpal = "0.17"

# Audio resampling
rubato = "0.15"

# WebSocket client
tokio-tungstenite = { version = "0.28", features = ["native-tls"] }
futures-util = "0.3"
url = "2.3"
rand = "0.10.0"

# Environment and configuration
dotenvy = "0.15"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Serialization (for potential message framing)
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async channels
async-channel = "2"
async-trait = "0.1.89"

# DB
chrono = { version = "0.4.44", features = ["serde"] }
sqlx = { version = "=0.8.6", features = ["sqlite"] }
rusqlite = "0.32.1"
uuid = { version = "1.21.0", features = ["v4"] }

# Tools
sysinfo = "0.38.3"

# Voice Activity Detection
voice_activity_detector = "0.2.1"